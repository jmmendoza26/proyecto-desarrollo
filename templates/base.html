<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FreshScan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Nunito:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  {% block head %}{% endblock %}
</head>
<body>

  <!-- Texture overlay -->
  <div class="noise" aria-hidden="true"></div>

  <nav class="navbar">
    <a href="/" class="nav-brand">
      <span class="brand-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 2C7 5 4 8.5 4 12.5C4 16.5 7.1 19.5 11 19.5C14.9 19.5 18 16.5 18 12.5C18 8.5 15 5 11 2Z" fill="currentColor" opacity="0.18"/>
          <path d="M11 2C7 5 4 8.5 4 12.5C4 16.5 7.1 19.5 11 19.5C14.9 19.5 18 16.5 18 12.5C18 8.5 15 5 11 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M11 19.5V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M11 10C11 10 8.5 8.5 6.5 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M11 14C11 14 13.5 12.5 15.5 13.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="brand-name">FreshScan</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Scan</a>
      <a href="/history" class="nav-link {% if request.url.path == '/history' %}active{% endif %}">History</a>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>


</body>
</html>
