<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FreshScan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  {% block head %}{% endblock %}
</head>
<body>

  <!-- Noise overlay -->
  <div class="noise" aria-hidden="true"></div>

  <nav class="navbar">
    <a href="/" class="nav-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">FreshScan</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Scan</a>
      <a href="/history" class="nav-link {% if request.url.path == '/history' %}active{% endif %}">History</a>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span class="footer-label">Recognizes</span>
    {% for cls in [("🍎", "Apple"), ("🍌", "Banana"), ("🍅", "Tomato"), ("🥔", "Potato"), ("🧅", "Onion")] %}
      <span class="footer-chip">{{ cls[0] }} {{ cls[1] }}</span>
    {% endfor %}
  </footer>

</body>
</html>
